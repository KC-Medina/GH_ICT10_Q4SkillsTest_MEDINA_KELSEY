<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Attendance Tracker </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

<style>
         body {
            background-color: #dc84ee; 
        }
        btn-custom {
            background-color: #554670; 
            color: rgb(95, 69, 112);
        }
        .card-custom {
            background-color: #e39cf1; 
            border-radius: 20px;
        }
        .title-text {
            color: #7a3377; 
            font-weight: bold;
        } 
        .btn-custom:hover {
            background-color: #7d4b86;
        }
        #output {
            background-color: #ab76b6; 
            color: rgb(52, 10, 68);
            border-radius: 10px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">
    <div class="card card-custom shadow-lg p-4" style="width: 400px;">
        <h3 class="text-center title-text mb-4">Attendance Tracker</h3>

    <form>
        <div class="mb-3">
            <label class="form-label fw-bold">Select Day</label>
            <select id="dayOfTheWeek" class="form-select">
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                 <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
    </select>
        </div>

        <div class="mb-3">
             <label class="form-label fw-bold">Absences</label>
             <input type="number" id="absences" class="form-control" placeholder="Enter number of absences">
         </div>
         <div class="d-grid">
            <input type="button" py-click="displaying" value="Submit" class="btn btn-custom">
        </div>
             </form>

        <div id="output" class="mt-3 p-2 text-center fs-5"></div>
        </div>
    <py-script src="main.py"></py-script>
</body>
</html>
